services:
  open-terminal:
    extends:
      file: ${TEMPLATES_PATH}
      service: default
    build: .
    image: open-terminal
    container_name: open-terminal
    ports:
      - 8000:8000
    volumes:
      - ./open-terminal:/home/user
    environment:
      OPEN_TERMINAL_API_KEY: ${OPEN_TERMINAL_API_KEY}

    labels:
      # Watchtower Automatic Updates
      com.centurylinklabs.watchtower.enable: true
